appId: com.sistemagvp.pos
productName: Sistema GVP
directories:
  output: release
  buildResources: build

asar: true

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: backend-publish
    to: backend
    filter:
      - "**/*"

win:
  sign: null
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

mac:
  target: dmg
  icon: build/icon.icns

linux:
  target:
    - AppImage
  category: Office
  icon: build/icon.png
  synopsis: Punto de Venta para Ferreterías
  description: "Sistema completo de gestión para ferreterías: ventas, inventario, clientes, crédito, reportes y backups. Funciona sin internet."

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  perMachine: false
  deleteAppDataOnUninstall: false
  shortcutName: Sistema GVP

publish: null
